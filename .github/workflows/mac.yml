name: Mac-Cloud-Gratis
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Installa Ngrok
        run: brew install --cask ngrok
      - name: Avvia Tunnel
        run: |
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 5900 &
      - name: Attiva VNC e Utente
        run: |
          sudo /usr/libexec/PlistBuddy -c "Set :DesktopViewOptions:IconSize 64" ~/Library/Preferences/com.apple.finder.plist
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "Papà Hacker"
          sudo dscl . -create /Users/vncuser UniqueID 1001
          sudo dscl . -create /Users/vncuser PrimaryGroupID 80
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser ${{ secrets.VNC_USER_PASSWORD }}
          sudo dscl . -append /Groups/admin GroupMembership vncuser
          sudo createhomedir -c -u vncuser
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvncpw -vncpw ${{ secrets.VNC_PASSWORD }} -restart -agent -privs -all
      - name: Mantieni in vita
        run: |
          echo "Indirizzo disponibile su Dashboard Ngrok -> Endpoints"
          sleep 21600

